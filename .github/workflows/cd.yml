name: cd
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: build code
        run: npm run build
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Use gcloud CLI
        run: gcloud info

      - name: Build and push Docker image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/autolinks-12345/autolinks-repo/autolinks:latest

      - name: Deploy to Cloud Run
        run: gcloud run deploy autolinks --image us-central1-docker.pkg.dev/autolinks-12345/autolinks-repo/autolinks:latest --region us-central1 --allow-unauthenticated --project autolinks-12345 --max-instances=4
